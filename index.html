<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Expert ™ | The AI Concierge</title>

    <!--
        FIX 4: CDN scripts are at the very TOP of <head>.
        This guarantees Vapi and Socket.io are parsed before
        any inline JS or DOM elements are evaluated.
    -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/dist/vapi.browser.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        /* ─── DESIGN TOKENS ─── */
        :root {
            --gold:         #D4AF37;
            --gold-light:   #F0D060;
            --black:        #080808;
            --glass-bg:     rgba(255, 255, 255, 0.04);
            --glass-border: rgba(212, 175, 55, 0.25);
            --blur:         18px;
            --radius:       24px;
            --transition-vibe: 1.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--black);
            color: white;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            transition: background var(--transition-vibe);
        }

        /* ─── AMBIENT LAYER ─── */
        #ambient-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 30%, rgba(212,175,55,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 80% 70%, rgba(212,175,55,0.05) 0%, transparent 70%);
        }

        /* ─── GLASS PANEL ─── */
        #screen {
            position: relative;
            z-index: 1;
            width: min(780px, 90vw);
            height: 62vh;
            min-height: 340px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            overflow: hidden;
            box-shadow:
                inset 0 1px 0 rgba(212,175,55,0.15),
                0 0 60px rgba(212,175,55,0.06),
                0 20px 80px rgba(0,0,0,0.6);
            transition: box-shadow var(--transition-vibe), border-color var(--transition-vibe);
        }

        #screen::before, #screen::after {
            content: '';
            position: absolute;
            width: 60px; height: 60px;
            border-color: var(--gold);
            border-style: solid;
            opacity: 0.5;
        }
        #screen::before { top: 16px; left: 16px; border-width: 1px 0 0 1px; }
        #screen::after  { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; }

        /* ─── CONTENT ─── */
        #content {
            width: 100%;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        @keyframes contentReveal {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .default-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.8rem, 6vw, 5rem);
            font-weight: 300;
            letter-spacing: 0.12em;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 12px;
            animation: contentReveal 1s cubic-bezier(0.16,1,0.3,1) both;
        }
        .default-sub {
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
            margin-bottom: 28px;
            animation: contentReveal 1s 0.15s cubic-bezier(0.16,1,0.3,1) both;
        }
        .default-instruction {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.08em;
            animation: contentReveal 1s 0.3s cubic-bezier(0.16,1,0.3,1) both;
        }

        /* ─── PULSE RINGS ─── */
        .pulse-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(212,175,55,0.12);
            animation: pulseRing 4s ease-out infinite;
            pointer-events: none;
            top: 50%; left: 50%;
        }
        .pulse-ring:nth-child(1) { width: 200px; height: 200px; margin: -100px 0 0 -100px; animation-delay: 0s; }
        .pulse-ring:nth-child(2) { width: 320px; height: 320px; margin: -160px 0 0 -160px; animation-delay: 1.2s; }
        .pulse-ring:nth-child(3) { width: 440px; height: 440px; margin: -220px 0 0 -220px; animation-delay: 2.4s; }

        @keyframes pulseRing {
            0%   { transform: scale(0.85); opacity: 0.4; }
            60%  { opacity: 0.08; }
            100% { transform: scale(1.1); opacity: 0; }
        }

        /* ─── QR CARD ─── */
        .qr-card {
            background: rgba(255,255,255,0.97);
            color: #111;
            padding: 28px 32px;
            border-radius: 18px;
            display: inline-block;
            animation: qrReveal 1.1s cubic-bezier(0.16,1,0.3,1) both;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,55,0.4);
        }

        @keyframes qrReveal {
            0%   { opacity: 0; transform: scale(0.85) translateY(30px); filter: blur(8px); }
            60%  { filter: blur(0); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        .qr-card h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem; font-weight: 600;
            color: #111; margin-bottom: 16px; letter-spacing: 0.04em;
        }
        .qr-card img { display: block; margin: 0 auto 14px; border-radius: 8px; }
        .qr-card p   { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: #555; }

        /* ─── VIP WELCOME ─── */
        .vip-welcome h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 7vw, 5.5rem);
            font-weight: 300; color: var(--gold); letter-spacing: 0.18em;
            animation: contentReveal 0.9s cubic-bezier(0.16,1,0.3,1) both;
        }
        .vip-welcome p { font-size: 0.65rem; letter-spacing: 0.5em; color: rgba(255,255,255,0.4); margin-top: 8px; }

        /* ─── AI STATE HUD ─── */
        #ai-hud {
            position: fixed; top: 20px; right: 20px; z-index: 10;
            display: flex; align-items: center; gap: 9px;
            background: rgba(10,10,10,0.7);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px; padding: 8px 16px;
            backdrop-filter: blur(12px);
            transition: all 0.4s ease;
        }
        #ai-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }
        #ai-state-label {
            font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase;
            color: rgba(255,255,255,0.4); transition: color 0.4s ease;
        }

        #ai-hud.state-listening #ai-dot       { background: #4ade80; box-shadow: 0 0 8px #4ade80; animation: dotPulse 1.2s ease infinite; }
        #ai-hud.state-listening #ai-state-label { color: #4ade80; }
        #ai-hud.state-thinking  #ai-dot       { background: var(--gold); box-shadow: 0 0 8px var(--gold); animation: dotPulse 0.8s ease infinite; }
        #ai-hud.state-thinking  #ai-state-label { color: var(--gold-light); }
        #ai-hud.state-executing #ai-dot       { background: #60a5fa; box-shadow: 0 0 8px #60a5fa; animation: dotSpin 0.6s linear infinite; }
        #ai-hud.state-executing #ai-state-label { color: #93c5fd; }
        #ai-hud.state-offline   #ai-dot       { background: #f87171; box-shadow: 0 0 8px #f87171; }
        #ai-hud.state-offline   #ai-state-label { color: #fca5a5; }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50%       { transform: scale(1.5); opacity: 0.5; }
        }
        @keyframes dotSpin {
            from { transform: rotate(0deg) scale(1.2); }
            to   { transform: rotate(360deg) scale(1.2); }
        }

        /* ─── CTA BUTTON ─── */
        #vapi-btn {
            position: relative; z-index: 1;
            padding: 18px 64px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.78rem; font-weight: 700;
            letter-spacing: 0.3em; text-transform: uppercase;
            background: transparent; color: var(--gold);
            border: 1px solid var(--gold); border-radius: 50px;
            cursor: pointer; overflow: hidden;
            transition: color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease, transform 0.2s ease;
        }
        #vapi-btn::before {
            content: ''; position: absolute; inset: 0;
            background: var(--gold);
            transform: scaleX(0); transform-origin: left;
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            z-index: -1;
        }
        #vapi-btn:hover            { color: #000; box-shadow: 0 0 30px rgba(212,175,55,0.4); transform: translateY(-2px); }
        #vapi-btn:hover::before    { transform: scaleX(1); }
        #vapi-btn:active           { transform: translateY(0); }
        #vapi-btn.active           { background: rgba(255,75,43,0.15); border-color: #ff4b2b; color: #ff4b2b; box-shadow: 0 0 30px rgba(255,75,43,0.25); }
        #vapi-btn.active::before   { display: none; }
        #vapi-btn:disabled         { opacity: 0.35; cursor: not-allowed; transform: none; }

        /* ─── STATUS ─── */
        #status { font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.2); transition: color 0.4s ease; }

        /* ─── VIBE CLASSES ─── */
        body.vibe-rain      { background: radial-gradient(ellipse at 30% 20%, #001a35 0%, #000508 70%); }
        body.vibe-rain #screen { border-color: rgba(100,180,255,0.2); box-shadow: inset 0 1px 0 rgba(100,180,255,0.1), 0 0 80px rgba(0,60,120,0.2), 0 20px 80px rgba(0,0,0,0.7); }

        body.vibe-luxury    { background: radial-gradient(ellipse at 50% 40%, #2a1f00 0%, #0d0900 70%); }
        body.vibe-luxury #screen { border-color: rgba(212,175,55,0.4); box-shadow: inset 0 1px 0 rgba(212,175,55,0.3), 0 0 80px rgba(212,175,55,0.1), 0 20px 80px rgba(0,0,0,0.7); }

        body.vibe-adventure { background: radial-gradient(ellipse at 70% 60%, #2a0000 0%, #050000 70%); }
        body.vibe-adventure #screen { border-color: rgba(200,40,40,0.3); box-shadow: inset 0 1px 0 rgba(200,40,40,0.15), 0 0 60px rgba(150,20,20,0.1), 0 20px 80px rgba(0,0,0,0.7); }

        /* ─── OFFLINE BANNER ─── */
        #offline-banner {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            z-index: 20;
            background: rgba(248,113,113,0.12);
            border: 1px solid rgba(248,113,113,0.35);
            border-radius: 50px; padding: 10px 24px;
            font-size: 0.65rem; letter-spacing: 0.25em;
            color: #fca5a5; text-transform: uppercase;
            backdrop-filter: blur(10px);
            transition: transform 0.6s cubic-bezier(0.16,1,0.3,1), opacity 0.6s ease;
            opacity: 0; pointer-events: none;
        }
        #offline-banner.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div id="ambient-layer"></div>

    <div id="ai-hud">
        <div id="ai-dot"></div>
        <span id="ai-state-label">Loading...</span>
    </div>

    <div id="screen">
        <div id="content">
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <h1 class="default-title">TRAVEL EXPERT ™</h1>
            <p class="default-sub">Dubai's Premier AI Concierge</p>
            <p class="default-instruction">Tap the button below to start your experience.</p>
        </div>
    </div>

    <!--
        Button starts DISABLED.
        It is only enabled inside window.onload after Vapi is confirmed loaded.
    -->
    <button id="vapi-btn" disabled>Loading...</button>
    <div id="status">Initializing System...</div>

    <div id="offline-banner">⚠ Connection interrupted — retrying…</div>

    <script>
        // ─────────────────────────────────────────────
        // FIX 1 & 2: Clean constant names.
        // No dashes in variable names. No _HERE suffix. Clean UUIDs.
        // ─────────────────────────────────────────────
        const RENDER_BRIDGE_URL = "https://kiosk-bridge.onrender.com";
        const VAPI_PUBLIC_KEY   = "3bfe6c30-430a-4ee2-b584-7044d5adab0a";
        const ASSISTANT_ID      = "fcb09257-e877-494d-a7c9-d3a152da0059";

        // ─── DOM ───
        const btn           = document.getElementById('vapi-btn');
        const statusEl      = document.getElementById('status');
        const contentEl     = document.getElementById('content');
        const aiHud         = document.getElementById('ai-hud');
        const aiLabelEl     = document.getElementById('ai-state-label');
        const offlineBanner = document.getElementById('offline-banner');

        // ─── STATE MACHINE ───
        const AI_STATES = {
            IDLE:      { label: 'System Online', cls: '' },
            LISTENING: { label: 'Listening...',  cls: 'state-listening' },
            THINKING:  { label: 'Thinking...',   cls: 'state-thinking'  },
            EXECUTING: { label: 'Executing...',  cls: 'state-executing' },
            OFFLINE:   { label: 'Offline',       cls: 'state-offline'   },
        };

        function setAIState(state) {
            const s = AI_STATES[state] || AI_STATES.IDLE;
            aiHud.className    = s.cls;
            aiLabelEl.textContent = s.label;
        }

        function showOffline(show) {
            offlineBanner.classList.toggle('visible', show);
            setAIState(show ? 'OFFLINE' : 'IDLE');
        }

        // ─── CONTENT RENDERER ───
        function setVibeClass(vibe) {
            document.body.classList.remove('vibe-rain', 'vibe-luxury', 'vibe-adventure');
            if (vibe) document.body.classList.add(`vibe-${vibe}`);
        }

        function renderContent(html) {
            contentEl.style.opacity   = '0';
            contentEl.style.transform = 'translateY(12px)';
            setTimeout(() => {
                contentEl.innerHTML       = html;
                contentEl.style.opacity   = '1';
                contentEl.style.transform = 'translateY(0)';
            }, 420);
        }

        function renderDefault() {
            setVibeClass(null);
            renderContent(`
                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>
                <h1 class="default-title">TRAVEL EXPERT ™</h1>
                <p class="default-sub">Dubai's Premier AI Concierge</p>
                <p class="default-instruction">Tap the button below to start your experience.</p>
            `);
        }

        // ─── SOCKET.IO ───
        const socket = io(RENDER_BRIDGE_URL, {
            reconnection:         true,
            reconnectionAttempts: Infinity,
            reconnectionDelay:    2000,
            reconnectionDelayMax: 15000,
            timeout:              10000,
        });

        socket.on('connect',       ()    => { showOffline(false); statusEl.textContent = 'System Online · Ready for Voice'; console.log('✅ Socket connected:', socket.id); });
        socket.on('disconnect',    (r)   => { showOffline(true);  statusEl.textContent = 'Connection Lost · Retrying...';   console.warn('🔌 Socket disconnected:', r); });
        socket.on('connect_error', (err) => { showOffline(true);  console.error('❌ Socket error:', err.message); });

        socket.on('AI_STATE_UPDATE', ({ state }) => setAIState(state));

        socket.on('COMMAND_UPDATE_UI', (data) => {
            console.log('📡 UI Command received:', data);
            const { viewType, tourName, qrUrl, vibe } = data;
            setVibeClass(vibe);

            const qrDelay = vibe === 'luxury' ? 2500 : 0;

            if (vibe === 'luxury') {
                renderContent(`
                    <div class="vip-welcome">
                        <h1>WELCOME VIP</h1>
                        <p>Your experience is being prepared</p>
                    </div>
                `);
            }

            if (viewType === 'tour_details' || viewType === 'booking_qr') {
                setTimeout(() => {
                    renderContent(`
                        <div class="qr-card">
                            <h2>${tourName || 'Your Experience'}</h2>
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(qrUrl)}" alt="Scan to Book" width="220" height="220">
                            <p>Scan to Book Instantly</p>
                        </div>
                    `);
                }, qrDelay);
            }

            setTimeout(() => setAIState('IDLE'), qrDelay + 1000);
        });

        // ─────────────────────────────────────────────
        // FIX 3 & 4: window.onload guard
        //
        // All Vapi initialization and button wiring lives here.
        // This function fires ONLY after every script on the page
        // (including both CDN scripts) has fully loaded and executed.
        // The button is disabled until this point.
        // ─────────────────────────────────────────────
        window.onload = function () {
            console.log('✅ window.onload fired.');

            // Guard: if Vapi CDN failed to load, fail gracefully
            if (typeof Vapi === 'undefined') {
                console.error('❌ Vapi library not found. CDN may have failed.');
                statusEl.textContent = 'Error: Voice engine unavailable.';
                btn.textContent = 'Unavailable';
                return; // Stop here — do not attach broken listener
            }

            console.log('✅ Vapi confirmed. Initializing instance...');

            // FIX 2 TRACE: Log the exact string being passed to vapi.start()
            // Open browser console to verify this prints the correct UUID.
            console.log('🔑 ASSISTANT_ID =', ASSISTANT_ID);
            console.log('🔑 VAPI_PUBLIC_KEY =', VAPI_PUBLIC_KEY);

            const vapi = new Vapi(VAPI_PUBLIC_KEY);
            console.log('✅ Vapi instance created:', vapi);

            // Unlock the button — system is ready
            btn.disabled    = false;
            btn.textContent = 'Talk to Concierge';
            statusEl.textContent = 'System Online · Ready for Voice';
            setAIState('IDLE');

            // ── BUTTON CLICK ──
            btn.addEventListener('click', () => {
                // FIX 3: Guard in case of a race condition
                if (!vapi) {
                    console.error('❌ vapi object is null. Cannot start call.');
                    return;
                }

                // This log is your proof of life in the console.
                // If you see this and the correct UUID, the button is working.
                console.log('🎤 vapi.start() called with ASSISTANT_ID:', ASSISTANT_ID);

                vapi.start(ASSISTANT_ID);
                btn.textContent = 'Listening...';
                btn.classList.add('active');
                statusEl.textContent = 'Microphone Active · Speak Now';
                setAIState('LISTENING');
            });

            // ── VAPI EVENTS ──
            vapi.on('speech-start', () => {
                console.log('🎙 Guest is speaking');
                setAIState('LISTENING');
            });

            vapi.on('speech-end', () => {
                console.log('🤫 Guest stopped speaking — AI processing');
                setAIState('THINKING');
            });

            vapi.on('call-end', () => {
                console.log('📵 Call ended. Resetting UI.');
                btn.textContent = 'Talk to Concierge';
                btn.classList.remove('active');
                statusEl.textContent = 'System Online · Ready for Voice';
                setAIState('IDLE');
                setTimeout(renderDefault, 800);
            });

            vapi.on('error', (err) => {
                console.error('❌ Vapi runtime error:', err);
                btn.textContent = 'Talk to Concierge';
                btn.classList.remove('active');
                btn.disabled = false;
                statusEl.textContent = 'Voice Error · Please Try Again';
                setAIState('IDLE');
            });
        };
    </script>
</body>
</html>
