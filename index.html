<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Expert ™ | The AI Concierge</title>
    <script src='https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/dist/vapi.browser.js'></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <style>
        :root { --gold: #D4AF37; --black: #0a0a0a; }
        body { 
            background: var(--black); 
            color: white; 
            font-family: 'Helvetica Neue', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            transition: background 1.5s ease;
        }
        #screen { 
            width: 90%; 
            height: 70vh; 
            border: 2px solid var(--gold); 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 20px; 
            transition: all 0.5s ease; 
            background: rgba(0,0,0,0.5);
        }
        .qr-card { background: white; padding: 25px; border-radius: 15px; color: black; animation: fadeIn 0.8s ease; }
        #vapi-btn { 
            margin-top: 30px; 
            padding: 20px 60px; 
            font-size: 1.5rem; 
            background: var(--gold); 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        #status { margin-top: 10px; color: var(--gold); font-size: 0.9rem; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="screen">
        <div id="content">
            <h1 style="color: var(--gold); font-size: 3rem; margin-bottom: 0;">TRAVEL EXPERT ™</h1>
            <p style="letter-spacing: 2px;">DUBAI'S PREMIER AI CONCIERGE</p>
            <p id="instruction">Tap the button below to start your experience.</p>
        </div>
    </div>

    <button id="vapi-btn">Talk to Concierge</button>
    <div id="status">System Online | Ready for Voice</div>

    <script>
        <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
    // 2. Wrap your initialization in a check to ensure 'io' exists
    let socket;
    
    function connectSocket() {
        if (typeof io !== 'undefined') {
            socket = io("https://kiosk-bridge.onrender.com", {
                reconnection: true,
                reconnectionDelayMax: 15000
            });
            console.log("✅ Socket.io initialized successfully.");
            
            // Re-bind your listeners here
            setupSocketListeners(); 
        } else {
            console.error("❌ Socket.io failed to load. Retrying in 1s...");
            setTimeout(connectSocket, 1000);
        }
    }

    // Call it immediately
    connectSocket();
</script>
</body>
</html>
