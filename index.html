<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Travel Expert ™ | The AI Concierge</title>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="vapi.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --glass: rgba(5,5,5,0.7);
            --blur: 20px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 100%; height: 100vh;
            overflow: hidden;
            background: var(--black);
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        /* L1: THE CHARACTER (Always Visible) */
        #agent-video {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: brightness(0.7);
            transition: filter 1s ease, transform 1s ease;
        }

        #agent-video.active { filter: brightness(1.1) saturate(1.1); transform: scale(1.02); }

        /* L2: THE VIGNETTE */
        #vignette {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.8) 100%);
        }

        /* L3: HUD & UI */
        #ui-layer {
            position: relative; z-index: 10;
            height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
            background: rgba(0,0,0,0.2);
        }

        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem; font-weight: 300; letter-spacing: 5px;
            margin-bottom: 10px; color: white;
        }
        .hero-title em { color: var(--gold); font-style: italic; }

        #status-hud {
            position: fixed; top: 30px; right: 30px;
            padding: 10px 20px; border-radius: 30px;
            background: var(--glass); backdrop-filter: blur(var(--blur));
            border: 1px solid rgba(212,175,55,0.2);
            font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
        }

        #talk-btn {
            margin-top: 40px; padding: 20px 50px;
            background: transparent; border: 1px solid var(--gold);
            color: var(--gold); font-size: 0.8rem; letter-spacing: 4px;
            cursor: pointer; transition: all 0.3s ease;
            text-transform: uppercase;
        }
        #talk-btn:active { background: var(--gold); color: black; }

        #session-bar {
            position: fixed; bottom: 50px;
            display: none; align-items: center; gap: 20px;
            padding: 15px 30px; border-radius: 50px;
            background: var(--glass); backdrop-filter: blur(var(--blur));
            border: 1px solid var(--gold);
        }
    </style>
</head>
<body>

    <video id="agent-video" autoplay loop muted playsinline>
        <source src="bg.mp4" type="video/mp4">
    </video>

    <div id="vignette"></div>

    <div id="status-hud">Connecting...</div>

    <div id="ui-layer">
        <div id="hero-content">
            <p style="letter-spacing: 8px; font-size: 0.6rem; opacity: 0.7;">DUBAI LUXURY</p>
            <h1 class="hero-title">Travel <em>Expert</em></h1>
            <p style="letter-spacing: 3px; font-size: 0.7rem; opacity: 0.5;">THE AI CONCIERGE</p>
            <button id="talk-btn">Begin Experience</button>
        </div>

        <div id="session-bar">
            <span id="session-label">AGENT LISTENING</span>
            <button id="end-btn" style="background: none; border: none; color: #ff4444; cursor: pointer; font-weight: bold; font-size: 0.7rem; letter-spacing: 2px;">END SESSION</button>
        </div>
    </div>

    <script>
        const RENDER_URL = "https://kiosk-bridge.onrender.com";
        const VAPI_KEY = "3bfe6c30-430a-4ee2-b584-7044d5adab0a";
        const ASSISTANT_ID = "fcb09257-e877-494d-a7c9-d3a152da0059";

        // 1. FORCED POLLING SOCKET (The Firewall Bypass)
        const socket = io(RENDER_URL, {
            transports: ['polling'],
            upgrade: false,
            reconnection: true
        });

        const statusHud = document.getElementById('status-hud');
        const agentVideo = document.getElementById('agent-video');
        const talkBtn = document.getElementById('talk-btn');
        const sessionBar = document.getElementById('session-bar');
        const heroContent = document.getElementById('hero-content');

        socket.on('connect', () => {
            statusHud.textContent = "SYSTEM READY";
            statusHud.style.color = "#4ade80";
        });

        socket.on('disconnect', () => {
            statusHud.textContent = "RECONNECTING...";
            statusHud.style.color = "#f87171";
        });

        // 2. VAPI INITIALIZATION (Local File)
        let vapiInstance = null;
        if (typeof Vapi !== 'undefined') {
            vapiInstance = new Vapi(VAPI_KEY);
        } else {
            statusHud.textContent = "VAPI OFFLINE";
        }

        talkBtn.addEventListener('click', () => {
            if (vapiInstance) {
                vapiInstance.start(ASSISTANT_ID);
                heroContent.style.display = 'none';
                sessionBar.style.display = 'flex';
                agentVideo.classList.add('active');
            }
        });

        document.getElementById('end-btn').addEventListener('click', () => {
            vapiInstance.stop();
            location.reload(); 
        });

        // 3. UI State Sync
        socket.on('AI_STATE_UPDATE', ({ state }) => {
            statusHud.textContent = state;
            if (state === 'SPEAKING') agentVideo.style.filter = "brightness(1.2)";
            else agentVideo.style.filter = "brightness(0.8)";
        });

    </script>
</body>
</html>
