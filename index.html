<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Expert ™ | The AI Concierge</title>
    <script src='https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/dist/vapi.browser.js'></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <style>
        :root { --gold: #D4AF37; --black: #0a0a0a; }
        body { 
            background: var(--black); 
            color: white; 
            font-family: 'Helvetica Neue', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            transition: background 1.5s ease;
        }
        #screen { 
            width: 90%; 
            height: 70vh; 
            border: 2px solid var(--gold); 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 20px; 
            transition: all 0.5s ease; 
            background: rgba(0,0,0,0.5);
        }
        .qr-card { background: white; padding: 25px; border-radius: 15px; color: black; animation: fadeIn 0.8s ease; }
        #vapi-btn { 
            margin-top: 30px; 
            padding: 20px 60px; 
            font-size: 1.5rem; 
            background: var(--gold); 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        #status { margin-top: 10px; color: var(--gold); font-size: 0.9rem; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="screen">
        <div id="content">
            <h1 style="color: var(--gold); font-size: 3rem; margin-bottom: 0;">TRAVEL EXPERT ™</h1>
            <p style="letter-spacing: 2px;">DUBAI'S PREMIER AI CONCIERGE</p>
            <p id="instruction">Tap the button below to start your experience.</p>
        </div>
    </div>

    <button id="vapi-btn">Talk to Concierge</button>
    <div id="status">System Online | Ready for Voice</div>

    <script>
        // --- 1. CONFIGURATION ---
        const RENDER_BRIDGE_URL = "https://kiosk-bridge.onrender.com";
        const VAPI_PUBLIC_KEY = "3bfe6c30-430a-4ee2-b584-7044d5adab0a"; 
        const ASSISTANT_ID = "fcb09257-e877-494d-a7c9-d3a152da0059"; // FIXED THE VARIABLE NAME

        // --- 2. VAPI VOICE ENGINE ---
        const vapi = new Vapi(VAPI_PUBLIC_KEY);
        const btn = document.getElementById('vapi-btn');
        const status = document.getElementById('status');

        btn.addEventListener('click', () => {
            vapi.start(ASSISTANT_ID); // UPDATED TO MATCH NEW VARIABLE NAME
            btn.innerText = "Listening...";
            btn.style.background = "#ff4b2b";
            status.innerText = "Microphone Active | Speak Now";
        });

        vapi.on('call-end', () => {
            btn.innerText = "Talk to Concierge";
            btn.style.background = "var(--gold)";
            status.innerText = "Call Ended | Ready for Voice";
        });

        // --- 3. SOCKET.IO & VIBE LOGIC ---
        const socket = io(RENDER_BRIDGE_URL);

        socket.on("COMMAND_UPDATE_UI", (data) => {
            console.log("UI Update Received:", data);
            const body = document.body;
            const content = document.getElementById('content');

            if (data.vibe === "rain") {
                body.style.background = "radial-gradient(circle, #001f3f 0%, #000000 100%)";
            } else if (data.vibe === "luxury") {
                body.style.background = "radial-gradient(circle, #4d3d0d 0%, #1a1a1a 100%)";
                content.innerHTML = `<h1 style="color: var(--gold); font-size: 4rem; animation: fadeIn 1s;">WELCOME VIP</h1>`;
            } else if (data.vibe === "adventure") {
                body.style.background = "radial-gradient(circle, #660000 0%, #000000 100%)";
            }

            const delay = data.vibe === "luxury" ? 2000 : 0;

            setTimeout(() => {
                if(data.viewType === "tour_details" || data.viewType === "booking_qr") {
                    content.innerHTML = `
                        <div class="qr-card">
                            <h2 style="margin-top:0; font-size: 1.8rem;">${data.tourName}</h2>
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(data.qrUrl)}" alt="QR Code">
                            <p style="margin-bottom:0;"><b>Scan to book instantly</b></p>
                        </div>
                    `;
                }
            }, delay);
        });
    </script>
</body>
</html>
